<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMINA CMS 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f0f1a; color: #fff; }
    .sidebar { background: #16162a; border-right: 1px solid #2a2a45; }
    .nav-item { padding: 0.75rem 1rem; border-radius: 0.5rem; cursor: pointer; transition: all 0.2s; }
    .nav-item:hover, .nav-item.active { background: #2a2a45; }
    .panel { display: none; }
    .panel.active { display: block; }
    input, textarea {
      background: #1e1e35;
      border: 1px solid #2a2a45;
      color: #fff;
      padding: 0.5rem 0.75rem;
      border-radius: 0.375rem;
      width: 100%;
      outline: none;
    }
    input:focus, textarea:focus { border-color: #3A86FF; }
    textarea { min-height: 80px; resize: vertical; }
    .btn-primary { background: #3A86FF; color: #fff; padding: 0.625rem 1.25rem; border-radius: 0.5rem; font-weight: 600; }
    .btn-primary:hover { background: #2a6fd8; }
    .btn-success { background: #00F5D4; color: #0A0A12; padding: 0.625rem 1.25rem; border-radius: 0.5rem; font-weight: 600; }
    .item-card { background: #1a1a2e; border: 1px solid #2a2a45; border-radius: 0.5rem; padding: 1rem; margin-bottom: 0.75rem; }
    .status { padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; }
    .status.ok { background: #00F5D41a; color: #00F5D4; }
    .status.err { background: #FF006E1a; color: #FF006E; }
    .hidden { display: none; }
  </style>
</head>
<body class="min-h-screen flex">
  <!-- Login -->
  <div id="login" class="fixed inset-0 bg-[#0f0f1a] z-50 flex items-center justify-center">
    <div class="w-full max-w-sm p-8 bg-[#16162a] border border-[#2a2a45] rounded-xl">
      <h1 class="text-2xl font-bold mb-2">LUMINA CMS</h1>
      <p class="text-white/50 mb-6">请输入管理密码</p>
      <input type="password" id="password" placeholder="管理密码" class="mb-4" onkeydown="if(event.key==='Enter')doLogin()">
      <button onclick="doLogin()" class="btn-primary w-full">登录</button>
      <p id="login-err" class="text-red-400 text-sm mt-3 hidden"></p>
    </div>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar w-64 flex-shrink-0 hidden" id="sidebar">
    <div class="p-6 border-b border-[#2a2a45]">
      <h1 class="text-xl font-bold">LUMINA CMS</h1>
      <p class="text-xs text-white/40 mt-1">内容管理后台</p>
    </div>
    <nav class="p-4 space-y-1" id="nav">
      <!-- nav items injected by JS -->
    </nav>
    <div class="mt-auto p-4 border-t border-[#2a2a45]">
      <button onclick="saveAll()" class="btn-success w-full">保存更改</button>
      <a href="/" target="_blank" class="block text-center text-sm text-white/50 hover:text-white mt-3">查看网站 →</a>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 p-8 hidden" id="main">
    <div class="flex items-center justify-between mb-6">
      <h2 id="page-title" class="text-2xl font-bold">编辑内容</h2>
      <div id="save-status" class="status hidden"></div>
    </div>
    <div id="panels"><!-- panels injected by JS --></div>
  </main>

<script>
const SECTIONS = [
  { key: 'site', label: '站点信息' },
  { key: 'nav', label: '导航' },
  { key: 'hero', label: '首屏' },
  { key: 'logos', label: 'Logo 横幅' },
  { key: 'features', label: '功能特性' },
  { key: 'workflow', label: '工作流' },
  { key: 'highlights', label: '亮点' },
  { key: 'cases', label: '客户案例' },
  { key: 'stats', label: '数据统计' },
  { key: 'testimonials', label: '用户评价' },
  { key: 'cta', label: '行动号召' },
  { key: 'contact', label: '联系表单' },
  { key: 'footer', label: '页脚' },
];

let content = {};

async function loadContent() {
  const res = await fetch('/api/content');
  content = await res.json();
  renderNav();
  renderPanels();
  showPanel(SECTIONS[0].key);
}

function doLogin() {
  const pwd = document.getElementById('password').value;
  // Default password: lumina-admin (change in production)
  if (pwd !== 'lumina-admin') {
    const err = document.getElementById('login-err');
    err.textContent = '密码错误';
    err.classList.remove('hidden');
    return;
  }
  document.getElementById('login').classList.add('hidden');
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('main').classList.remove('hidden');
  loadContent();
}

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = SECTIONS.map(s =>
    `<div class="nav-item" data-key="${s.key}" onclick="showPanel('${s.key}')">${s.label}</div>`
  ).join('');
}

function renderPanels() {
  const panels = document.getElementById('panels');
  panels.innerHTML = SECTIONS.map(s => {
    const data = content[s.key];
    return `<div id="panel-${s.key}" class="panel">${buildEditor(s.key, data)}</div>`;
  }).join('');
}

function buildEditor(key, data, path = '') {
  if (Array.isArray(data)) {
    return `<div class="space-y-3">${data.map((item, i) =>
      `<div class="item-card" data-array-path="${path || key}[${i}]">
        <div class="flex items-center justify-between mb-3">
          <span class="text-sm font-semibold text-white/60">#${i + 1}</span>
          <button onclick="removeArrayItem('${path || key}', ${i})" class="text-xs text-red-400 hover:text-red-300">删除</button>
        </div>
        ${buildObjectEditor(`${path || key}[${i}]`, item)}
      </div>`
    ).join('')}<button onclick="addArrayItem('${path || key}')" class="btn-primary text-sm">添加项</button></div>`;
  }
  if (typeof data === 'object' && data !== null) {
    return buildObjectEditor(path || key, data);
  }
  return inputFor(path || key, data);
}

function buildObjectEditor(path, obj) {
  return `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">${Object.entries(obj).map(([k, v]) => {
    const fullPath = `${path}.${k}`;
    if (Array.isArray(v)) {
      return `<div class="md:col-span-2"><label class="block text-sm text-white/50 mb-2">${k}</label>${buildEditor(k, v, fullPath)}</div>`;
    }
    if (typeof v === 'object' && v !== null) {
      return `<div class="md:col-span-2 border border-[#2a2a45] rounded-lg p-4"><label class="block text-sm font-semibold text-white/70 mb-3">${k}</label>${buildObjectEditor(fullPath, v)}</div>`;
    }
    return `<div><label class="block text-sm text-white/50 mb-1">${k}</label>${inputFor(fullPath, v)}</div>`;
  }).join('')}</div>`;
}

function inputFor(path, value) {
  const str = value === null || value === undefined ? '' : String(value);
  if (str.length > 60 || str.includes('\n')) {
    return `<textarea data-path="${path}" onchange="updateValue('${path}', this.value)">${escapeHtml(str)}</textarea>`;
  }
  return `<input type="text" data-path="${path}" value="${escapeHtml(str)}" onchange="updateValue('${path}', this.value)">`;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function setPath(obj, path, value) {
  const keys = path.split('.');
  let cur = obj;
  for (let i = 0; i < keys.length - 1; i++) {
    const key = keys[i];
    const m = key.match(/^(.+)\[(\d+)\]$/);
    if (m) {
      cur = cur[m[1]][parseInt(m[2])];
    } else {
      cur = cur[key];
    }
  }
  const last = keys[keys.length - 1];
  const m = last.match(/^(.+)\[(\d+)\]$/);
  if (m) {
    cur[m[1]][parseInt(m[2])] = value;
  } else {
    cur[last] = value;
  }
}

function getPath(obj, path) {
  const keys = path.split('.');
  let cur = obj;
  for (const key of keys) {
    const m = key.match(/^(.+)\[(\d+)\]$/);
    if (m) {
      cur = cur[m[1]][parseInt(m[2])];
    } else {
      cur = cur[key];
    }
    if (cur === undefined) return undefined;
  }
  return cur;
}

function updateValue(path, value) {
  const original = getPath(content, path);
  if (typeof original === 'number') value = Number(value);
  if (typeof original === 'boolean') value = value === 'true';
  setPath(content, path, value);
}

function removeArrayItem(path, index) {
  const arr = getPath(content, path);
  arr.splice(index, 1);
  renderPanels();
  showPanel(path.split('.')[0]);
}

function addArrayItem(path) {
  const arr = getPath(content, path);
  if (arr.length > 0) {
    arr.push(JSON.parse(JSON.stringify(arr[arr.length - 1])));
  } else {
    arr.push('New item');
  }
  renderPanels();
  showPanel(path.split('.')[0]);
}

function showPanel(key) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${key}`).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[data-key="${key}"]`).classList.add('active');
  const label = SECTIONS.find(s => s.key === key)?.label || key;
  document.getElementById('page-title').textContent = label;
}

async function saveAll() {
  const status = document.getElementById('save-status');
  status.classList.remove('hidden', 'ok', 'err');
  status.textContent = '保存中...';
  try {
    const res = await fetch('/api/content', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(content),
    });
    const data = await res.json();
    if (data.success) {
      status.textContent = '已保存';
      status.classList.add('ok');
    } else {
      status.textContent = data.error || '保存失败';
      status.classList.add('err');
    }
  } catch (e) {
    status.textContent = '网络错误';
    status.classList.add('err');
  }
  setTimeout(() => status.classList.add('hidden'), 3000);
}
</script>
</body>
</html>
